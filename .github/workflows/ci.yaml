name: ci
on:
  push:
    branches: '*'
  pull_request:

jobs:
  test:
    name: Compile & Test
    strategy:
      matrix:
        go-version: ['1.25']
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}

    - name: Label PR by branch
      uses: actions/github-script@v9
      if: github.event_name == 'pull_request'
      with:
        script: |
          const branch = context.payload.pull_request.head.ref;
          const labelMap = {
            'enhancement':        ['enhancement/', 'feature/'],
            'breaking-change':    ['breaking/', 'break/'],
            'documentation':      ['docs/', 'doc/'],
            'bug':                ['bug/', 'fix/'],
            'tests':              ['test/', 'tests/'],
            'dependency-update':  ['dep/', 'dependency/', 'dependency-update/'],
            'snyk':               ['update/'],
          };
          const labels = [];
          for (const [label, prefixes] of Object.entries(labelMap)) {
            if (prefixes.some(p => branch.startsWith(p))) labels.push(label);
          }
          if (labels.length > 0) {
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels,
            });
          }

    - name: Run integration tests  
      run: make integration-test

    - name: Format code
      run: make format || true

    - name: Lint code
      run: make lint || true

    - name: Build binary
      run: make build
