name: PR Labeler
on:
  pull_request:
    types: [opened]

jobs:
  pr-labeler:
    runs-on: ubuntu-latest
    steps:
      - name: Label PR by branch
        uses: actions/github-script@v9
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const labelMap = {
              'enhancement':        ['enhancement/', 'feature/'],
              'breaking-change':    ['breaking/', 'break/'],
              'documentation':      ['docs/', 'doc/'],
              'bug':                ['bug/', 'fix/'],
              'tests':              ['test/', 'tests/'],
              'dependency-update':  ['dep/', 'dependency/', 'dependency-update/'],
              'snyk':               ['update/'],
            };
            const labels = [];
            for (const [label, prefixes] of Object.entries(labelMap)) {
              if (prefixes.some(p => branch.startsWith(p))) labels.push(label);
            }
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels,
              });
            }
